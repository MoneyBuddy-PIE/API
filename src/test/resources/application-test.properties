# Configuration pour les tests
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/moneybuddy_test}

# Security
spring.security.user.name=admin
spring.security.user.password=${PASSWORD_ADMIN:test-admin-password}

# JWT
jwt.secret=${JWT_SECRET:test-secret-key-for-testing-purposes-only}
jwt.expiration=86400000

# Cloudflare R2
cloudflare.access_key=${CLOUDFLARE_ACCESS_KEY:test-access-key}
cloudflare.secret_key=${CLOUDFLARE_SECRET_KEY:test-secret-key}
cloudflare.endpoint=${CLOUDFLARE_ENDPOINT:https://test.r2.cloudflarestorage.com}
cloudflare.bucket_name=${CLOUDFLARE_BUCKET_NAME:test-bucket}

# Discord Bot
discord.bot.token=${DISCORD_BOT_TOKEN:test-token}
discord.bot.enabled=${DISCORD_BOT_ENABLED:false}
discord.bot.channel.id=${DISCORD_BOT_CHANNEL_ID:test-channel-id}
discord.bot.command.prefix=!

# Resend Email
resend.api.key=${RESEND_API_KEY:test-resend-key}
resend.email=${RESEND_EMAIL:@test.com}

# Logging
logging.level.moneybuddy.fr.moneybuddy=DEBUG
logging.level.org.springframework.data.mongodb.core=DEBUG
